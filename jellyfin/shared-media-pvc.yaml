# Shared media on the node at /srv/media, mounted read-only into Jellyfin.
# hostPath is node-local; fine for this single-node K3s cluster.
# Managed by ArgoCD alongside the deployment so it can't be orphaned.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-shared-media
  labels:
    type: shared-media
    app: jellyfin
spec:
  capacity:
    storage: 200Gi
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: shared-media
  hostPath:
    path: /srv/media
    type: Directory
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-shared-media
  namespace: jellyfin
spec:
  accessModes:
    - ReadOnlyMany
  storageClassName: shared-media
  resources:
    requests:
      storage: 200Gi
  selector:
    matchLabels:
      app: jellyfin
      type: shared-media
