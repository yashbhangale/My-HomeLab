# Very low default requests/limits for any pod that doesn't set its own.
# ttyd is a lightweight web terminal, so it needs almost nothing.
apiVersion: v1
kind: LimitRange
metadata:
  name: defaults
  namespace: ttyd
spec:
  limits:
    - type: Container
      default:
        cpu: "100m"
        memory: "128Mi"
        ephemeral-storage: "256Mi"
      defaultRequest:
        cpu: "10m"
        memory: "32Mi"
        ephemeral-storage: "64Mi"
---
# No persistent storage is used in this namespace. This quota hard-blocks any
# PVC from being created here, keeping ttyd stateless.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: storage-quota
  namespace: ttyd
spec:
  hard:
    persistentvolumeclaims: "0"
