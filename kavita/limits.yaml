apiVersion: v1
kind: LimitRange
metadata:
  name: defaults
  namespace: kavita
spec:
  limits:
  - type: Container
    default:
      cpu: "1"
      memory: "1Gi"
      ephemeral-storage: "2Gi"
    defaultRequest:
      cpu: "50m"
      memory: "128Mi"
      ephemeral-storage: "512Mi"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: storage-quota
  namespace: kavita
spec:
  hard:
    local-path.storageclass.storage.k8s.io/requests.storage: "30Gi"
    local-path.storageclass.storage.k8s.io/persistentvolumeclaims: "5"
