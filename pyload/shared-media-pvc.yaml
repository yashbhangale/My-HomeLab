# Shared media on the node at /srv/media, mounted READ-WRITE into pyLoad so
# downloaded files land directly in the shared library (available to Jellyfin,
# Kavita, Nextcloud, Filebrowser, etc.).
# Managed by ArgoCD alongside the deployment so it can't be orphaned.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pyload-shared-media
  labels:
    type: shared-media
    app: pyload
spec:
  capacity:
    storage: 200Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: shared-media
  hostPath:
    path: /srv/media
    type: Directory
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pyload-shared-media
  namespace: pyload
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: shared-media
  resources:
    requests:
      storage: 200Gi
  selector:
    matchLabels:
      app: pyload
      type: shared-media
