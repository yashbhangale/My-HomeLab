apiVersion: apps/v1
kind: Deployment
metadata:
  name: pyload
  namespace: pyload
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pyload
  template:
    metadata:
      labels:
        app: pyload
    spec:
      containers:
      - name: pyload
        image: lscr.io/linuxserver/pyload-ng:latest
        ports:
        - containerPort: 8000   # web UI
        - containerPort: 9666   # click'n'load
        resources:
          requests:
            cpu: "50m"
            memory: "128Mi"
            ephemeral-storage: "512Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
            ephemeral-storage: "2Gi"
        env:
        # Run as uid/gid 33 so downloaded files stay consistent with the rest
        # of the shared media writers (Nextcloud/Filebrowser).
        - name: PUID
          value: "33"
        - name: PGID
          value: "33"
        - name: TZ
          value: "Asia/Kolkata"
        volumeMounts:
        - mountPath: /config
          name: config
        # Downloads land directly in the shared media library at /srv/media.
        - mountPath: /downloads
          name: shared-media
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: pyload-config
      - name: shared-media
        persistentVolumeClaim:
          claimName: pyload-shared-media
