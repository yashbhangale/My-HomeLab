apiVersion: v1
kind: Namespace
metadata:
  name: rocketchat

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-data
  namespace: rocketchat
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: rocketchat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          args:
            - "--bind_ip_all"
            - "--replSet"
            - "rs0"
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
      volumes:
        - name: mongodb-data
          persistentVolumeClaim:
            claimName: mongodb-data

---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: rocketchat
spec:
  type: ClusterIP
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rocketchat
  namespace: rocketchat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rocketchat
  template:
    metadata:
      labels:
        app: rocketchat
    spec:
      containers:
        - name: rocketchat
          image: registry.rocket.chat/rocketchat/rocket.chat:latest
          ports:
            - containerPort: 3000
          env:
            - name: ROOT_URL
              value: "https://chat.yashbhangale.site"
            - name: PORT
              value: "3000"
            - name: MONGO_URL
              value: "mongodb://mongodb.rocketchat.svc.cluster.local:27017/rocketchat?replicaSet=rs0"
            - name: MONGO_OPLOG_URL
              value: "mongodb://mongodb.rocketchat.svc.cluster.local:27017/local?replicaSet=rs0"
            - name: TZ
              value: "Asia/Kolkata"

---
apiVersion: v1
kind: Service
metadata:
  name: rocketchat
  namespace: rocketchat
spec:
  type: ClusterIP
  selector:
    app: rocketchat
  ports:
    - port: 3000
      targetPort: 3000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rocketchat
  namespace: rocketchat
spec:
  ingressClassName: traefik
  rules:
    - host: chat.yashbhangale.site
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rocketchat
                port:
                  number: 3000
