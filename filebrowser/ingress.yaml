# Kept for completeness; active routing is done by cloudflared (configmap.yaml).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: filebrowser
  namespace: filebrowser
spec:
  ingressClassName: traefik
  rules:
  - host: files.yashbhangale.site
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: filebrowser
            port:
              number: 80
