apiVersion: v1
kind: LimitRange
metadata:
  name: defaults
  namespace: filebrowser
spec:
  limits:
  - type: Container
    default:
      cpu: "500m"
      memory: "256Mi"
      ephemeral-storage: "512Mi"
    defaultRequest:
      cpu: "10m"
      memory: "32Mi"
      ephemeral-storage: "256Mi"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: storage-quota
  namespace: filebrowser
spec:
  hard:
    local-path.storageclass.storage.k8s.io/requests.storage: "5Gi"
    local-path.storageclass.storage.k8s.io/persistentvolumeclaims: "3"
