# Shared media on the node at /srv/media, mounted READ-WRITE into Nextcloud.
# Nextcloud is the writer: you upload here and Jellyfin/Kavita read the same files.
# Managed by ArgoCD alongside the release so it can't be orphaned.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nextcloud-shared-media
  labels:
    type: shared-media
    app: nextcloud
spec:
  capacity:
    storage: 200Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: shared-media
  hostPath:
    path: /srv/media
    type: Directory
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nextcloud-shared-media
  namespace: nextcloud
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: shared-media
  resources:
    requests:
      storage: 200Gi
  selector:
    matchLabels:
      app: nextcloud
      type: shared-media
