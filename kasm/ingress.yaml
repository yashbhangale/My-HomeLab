# Kept for completeness. Active routing is done by cloudflared (configmap.yaml).
# Kasm serves HTTPS with a self-signed cert, so Traefik would need a
# serverstransport with insecureSkipVerify - cloudflared handles this instead.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kasm
  namespace: kasm
  annotations:
    traefik.ingress.kubernetes.io/service.serversscheme: https
spec:
  ingressClassName: traefik
  rules:
  - host: kasm.yashbhangale.site
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kasm
            port:
              number: 443
