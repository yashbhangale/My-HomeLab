# Shared media on the node at /srv/media, mounted READ-WRITE into the Kasm pod.
# This makes /srv/media available inside Kasm's Docker-in-Docker environment so
# it can be volume-mapped into Chrome workspace sessions (configured in the
# Kasm admin UI -> Workspaces -> Volume Mappings).
# Managed by ArgoCD alongside the deployment so it can't be orphaned.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: kasm-shared-media
  labels:
    type: shared-media
    app: kasm
spec:
  capacity:
    storage: 200Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: shared-media
  hostPath:
    path: /srv/media
    type: Directory
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kasm-shared-media
  namespace: kasm
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: shared-media
  resources:
    requests:
      storage: 200Gi
  selector:
    matchLabels:
      app: kasm
      type: shared-media
