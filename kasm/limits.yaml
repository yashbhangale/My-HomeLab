apiVersion: v1
kind: LimitRange
metadata:
  name: defaults
  namespace: kasm
spec:
  limits:
  - type: Container
    default:
      cpu: "4"
      memory: "6Gi"
      ephemeral-storage: "10Gi"
    defaultRequest:
      cpu: "250m"
      memory: "512Mi"
      ephemeral-storage: "1Gi"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: storage-quota
  namespace: kasm
spec:
  hard:
    local-path.storageclass.storage.k8s.io/requests.storage: "40Gi"
    local-path.storageclass.storage.k8s.io/persistentvolumeclaims: "3"
