apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless
  namespace: paperless
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: paperless
  template:
    metadata:
      labels:
        app: paperless
    spec:
      containers:
      - name: paperless
        image: ghcr.io/paperless-ngx/paperless-ngx:latest
        ports:
        - containerPort: 8000
        env:
        # Must be set explicitly: the K8s-injected PAPERLESS_PORT service var
        # (tcp://<ip>:8000) collides with paperless-ngx's own bind-port var.
        - name: PAPERLESS_PORT
          value: "8000"
        - name: PAPERLESS_REDIS
          value: "redis://paperless-redis.paperless.svc.cluster.local:6379"
        - name: PAPERLESS_TIME_ZONE
          value: "Asia/Kolkata"
        - name: PAPERLESS_URL
          value: "https://paperless.yashbhangale.site"
        - name: PAPERLESS_OCR_LANGUAGE
          value: "eng"
        volumeMounts:
        - mountPath: /usr/src/paperless/data
          name: data
        - mountPath: /usr/src/paperless/media
          name: media
        - mountPath: /usr/src/paperless/consume
          name: consume
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: paperless-data
      - name: media
        persistentVolumeClaim:
          claimName: paperless-media
      - name: consume
        persistentVolumeClaim:
          claimName: paperless-consume
